name: Deploy to Production

# Deploys to youthful-fermi.vercel.app + aliases www.iulemirandaimoveis.com.br
# on every push to the youthful-fermi branch.
#
# Prerequisites (add to GitHub repo Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN  — Personal access token from https://vercel.com/account/tokens

on:
  push:
    branches:
      - youthful-fermi

concurrency:
  group: production-deploy
  cancel-in-progress: false   # Never cancel a running deploy

jobs:
  deploy:
    name: Vercel Production Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VERCEL_ORG_ID: team_ffkeAKopLLbEJTI8tZqY9Mi6
      VERCEL_PROJECT_ID: prj_nE6k1NpX6Q8uvL8rKcB68Pzp835T
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Variables
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep -o 'https://youthful-fermi-[^[:space:]]*' | tail -1)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"

      - name: Alias custom domain
        run: |
          vercel alias set "${{ steps.deploy.outputs.DEPLOY_URL }}" "www.iulemirandaimoveis.com.br" --token=${{ secrets.VERCEL_TOKEN }} --scope team_ffkeAKopLLbEJTI8tZqY9Mi6
          vercel alias set "${{ steps.deploy.outputs.DEPLOY_URL }}" "iulemirandaimoveis.com.br" --token=${{ secrets.VERCEL_TOKEN }} --scope team_ffkeAKopLLbEJTI8tZqY9Mi6
          echo "✅ Production live at https://www.iulemirandaimoveis.com.br"
