name: CI

on:
  push:
    branches: [main, youthful-fermi]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Debug versions
        run: |
          node --version
          npm --version
          echo "TypeScript: $(./node_modules/.bin/tsc --version)"
      - name: TypeScript check
        run: |
          set +e
          ./node_modules/.bin/tsc --noEmit 2>&1 | tee tsc_output.txt
          TSC_EXIT=${PIPESTATUS[0]}
          echo "tsc exit code: $TSC_EXIT"
          if [ -s tsc_output.txt ]; then
            echo "## TypeScript Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat tsc_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "ERRORS FOUND:"
            cat tsc_output.txt
          else
            echo "No TypeScript errors found"
          fi
          exit $TSC_EXIT
      - name: Upload tsc output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tsc-errors
          path: tsc_output.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx jest --passWithNoTests --forceExit --maxWorkers=2 src/__tests__
      - name: Intelligence engine unit tests
        run: npx jest --passWithNoTests --forceExit --maxWorkers=2 --testEnvironment=node src/lib/intelligence/__tests__

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx next lint --max-warnings 0
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=critical
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx next build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
