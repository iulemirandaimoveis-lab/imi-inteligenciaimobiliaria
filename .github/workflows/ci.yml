name: CI

on:
  push:
    branches: [main, youthful-fermi]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SENTRYCLI_SKIP_DOWNLOAD: '1'
  npm_config_cache: ~/.npm-v2

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Debug versions
        run: |
          node --version
          npm --version
          echo "TypeScript: $(./node_modules/.bin/tsc --version)"
      - name: TypeScript check
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          set +e
          ./node_modules/.bin/tsc --noEmit 2>&1 | tee tsc_output.txt
          TSC_EXIT=${PIPESTATUS[0]}
          echo "tsc exit code: $TSC_EXIT"
          if [ -s tsc_output.txt ]; then
            echo "## TypeScript Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat tsc_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "=== TYPESCRIPT ERRORS BEGIN ==="
            cat tsc_output.txt
            echo "=== TYPESCRIPT ERRORS END ==="
            while IFS= read -r line; do
              echo "::error::$line"
            done < tsc_output.txt
          else
            echo "No TypeScript errors found"
          fi
          exit $TSC_EXIT
      - name: Upload tsc output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tsc-errors
          path: tsc_output.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx jest --passWithNoTests --forceExit --maxWorkers=2 src/__tests__
      - name: Intelligence engine unit tests
        run: npx jest --passWithNoTests --forceExit --maxWorkers=2 --testEnvironment=node src/lib/intelligence/__tests__

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=critical
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [typecheck]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-
        continue-on-error: true
      - run: npm ci
      - run: npx next build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
