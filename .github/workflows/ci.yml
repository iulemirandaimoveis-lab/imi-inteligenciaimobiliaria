name: CI

on:
  push:
    branches: [main, youthful-fermi]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Debug versions
        run: |
          node --version
          npm --version
          echo "TypeScript: $(./node_modules/.bin/tsc --version)"
      - name: TypeScript check
        run: |
          ./node_modules/.bin/tsc --noEmit --incremental false > tsc_output.txt 2>&1
          TSC_EXIT=$?
          echo "tsc exit code: $TSC_EXIT"
          echo "tsc output bytes: $(wc -c < tsc_output.txt)"
          cat tsc_output.txt
          if [ $TSC_EXIT -ne 0 ]; then
            echo "## TypeScript Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat tsc_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            while IFS= read -r line; do
              echo "::error::$line"
            done < tsc_output.txt
          else
            echo "No TypeScript errors found"
          fi
          exit $TSC_EXIT
      - name: Post errors as PR comment
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          {
            echo "## TypeScript CI Errors"
            echo ""
            echo '```'
            cat tsc_output.txt 2>/dev/null || echo "(no tsc_output.txt — tsc may have crashed silently)"
            echo '```'
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload tsc output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tsc-errors
          path: tsc_output.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx jest --passWithNoTests --forceExit --maxWorkers=2 src/__tests__
      - name: Intelligence engine unit tests
        run: npx jest --passWithNoTests --forceExit --maxWorkers=2 --testEnvironment=node src/lib/intelligence/__tests__

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx next lint --max-warnings 0
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=critical
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx next build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
